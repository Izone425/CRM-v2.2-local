[program:reverb]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/timeteccrm/artisan reverb:start --host=127.0.0.1 --port=8080
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/timeteccrm/storage/logs/reverb.log
stopwaitsecs=3600
